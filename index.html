<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Refer & Earn | EarnMedia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f4f6f9;
            color: #1e293b;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .wrapper {
            background: #ffffff;
            width: 100%;
            max-width: 410px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.05);
            position: relative;
            padding-bottom: 20px;
        }

        .top-banner {
            background: #1a56db;
            color: #ffffff;
            text-align: center;
            padding: 14px 10px;
            font-size: 13px;
            font-weight: 500;
            position: relative;
        }

        .badge-limited {
            background: #f59e0b;
            color: #000;
            font-weight: 700;
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 20px;
            position: absolute;
            right: 16px;
            bottom: -15px;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
            text-transform: uppercase;
        }

        .content-body {
            padding: 30px 16px 16px 16px;
            text-align: center;
        }

        h2.main-title {
            font-size: 19px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        p.sub-title {
            font-size: 13.5px;
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .main-payout {
            font-size: 44px;
            font-weight: 800;
            color: #2563eb;
            margin-bottom: 20px;
        }

        .accordion-btn {
            width: 100%;
            background: #f1f5f9;
            color: #2563eb;
            border: none;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .custom-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            text-align: left;
        }

        .input-block { margin-bottom: 12px; }
        .input-block label { display: block; font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 4px; }
        
        .input-wrapper {
            position: relative;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }

        .input-wrapper input {
            width: 100%;
            border: none;
            outline: none;
            padding: 10px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            border-radius: 8px;
        }

        .currency-symbol {
            position: absolute;
            left: 12px;
            top: 9px;
            color: #64748b;
            font-weight: 600;
        }

        .action-input-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            margin-bottom: 12px;
            height: 52px;
        }

        .action-input-box input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: #0f172a;
        }

        .submit-gen-btn {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            height: 52px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        .result-box {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            padding: 14px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: left;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="top-banner">Refer & Earn Program</div>
        <div class="content-body">
            <h2 class="main-title">Found It</h2>
            <div class="main-payout">₹ <span id="display-main-payout">340</span></div>

            <div id="custom-panel" class="custom-box">
                <div class="input-block">
                    <label>User Amount:</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">₹</span>
                        <input type="number" id="user-amount" oninput="balancePayoutFields(this, 'user')">
                    </div>
                </div>
                <div class="input-block" style="margin-top: 14px;">
                    <label>Referral Amount:</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">₹</span>
                        <input type="number" id="referral-amount" oninput="balancePayoutFields(this, 'referral')">
                    </div>
                </div>
            </div>

            <div id="setup-form-block">
                <div class="action-input-box">
                    <input type="text" id="input-upi" placeholder="Enter Your UPI ID (Mandatory)">
                </div>
                <button class="submit-gen-btn" onclick="generateCampaignLink()">Submit & Get Link</button>
            </div>

            <div id="visitor-action-block" style="display: none;">
                <div class="action-input-box" style="border: 1px solid #2563eb;">
                    <input type="text" id="visitor-upi" placeholder="Enter Your Payout UPI ID *">
                </div>
                <button class="submit-gen-btn" style="background:#10b981;" onclick="redirectToOffer()">Proceed to Task & Earn</button>
            </div>

            <div id="output-panel" class="result-box" style="display:none;">
                <strong style="color: #065f46; font-size: 13px;">Your Customized Campaign Share URL:</strong>
                <p id="generated-url" style="color: #047857; font-weight: 600; margin-top: 5px; font-size: 13px; font-family: monospace;"></p>
                <button class="submit-gen-btn" style="background:#059669; height:40px; margin-top:10px;" onclick="copyGeneratedLink()">Copy Custom URL</button>
            </div>
        </div>
    </div>

    <script>
        // ========================================================
        // ⚙️ CONFIGURATION: APNI DETAILS YAHAN DALEN
        // ========================================================
        const MY_CONFIG = {
            // ⚠️ APNI DASHBOARD KI REAL ORIGINAL EMBED LINK YAHAN DALEN
            earnMediaAffiliateLink: "https://partner.earnmedia.in/refer/?o=76&pid=67&cid=69fffcfccd0ae", 
            offerPool: 35 
        };
        // ========================================================

        function balancePayoutFields(input, fieldSource) {
            let userVal = parseInt(input.value) || 0;
            if(userVal > MY_CONFIG.offerPool) { userVal = MY_CONFIG.offerPool; input.value = MY_CONFIG.offerPool; }
            const userField = document.getElementById('user-amount');
            const refField = document.getElementById('referral-amount');
            if(fieldSource === 'user') { refField.value = MY_CONFIG.offerPool - userVal; } 
            else { userField.value = MY_CONFIG.offerPool - userVal; }
        }

        // USER A KE LIYE SAFE LINK GENERATION ENGINE
        function generateCampaignLink() {
            const upi = document.getElementById('input-upi').value.trim();
            const userAmt = document.getElementById('user-amount').value;
            const refAmt = document.getElementById('referral-amount').value;

            if(!upi) { alert("Please enter your UPI ID."); return; }

            // ⚠️ MOBILE LOCAL DRIVES COMPATIBILITY FIX
            let currentLiveUrl = window.location.href.split('?')[0];
            if(currentLiveUrl.startsWith('content://') || currentLiveUrl.startsWith('file://')) {
                currentLiveUrl = "https://earnmedia.github.io/Earn-media--panel/";
            }

            const finalGeneratedLandingLink = `${currentLiveUrl}?uAmt=${userAmt}&rAmt=${refAmt}&promoterUpi=${encodeURIComponent(upi)}`;
            
            document.getElementById('generated-url').innerText = finalGeneratedLandingLink;
            document.getElementById('output-panel').style.display = 'block';
            alert("Customized Link Generated Below!");
        }

        function copyGeneratedLink() {
            const linkText = document.getElementById('generated-url').innerText;
            navigator.clipboard.writeText(linkText);
            alert("Link copied successfully!");
        }

        // USER B (VISITOR) LOGIC SETUP
        let globalParams = {};
        window.onload = function() {
            const urlSearchArgs = new URLSearchParams(window.location.search);
            
            document.getElementById('display-main-payout').innerText = MY_CONFIG.offerPool;
            document.getElementById('user-amount').value = Math.round(MY_CONFIG.offerPool * 0.6);
            document.getElementById('referral-amount').value = MY_CONFIG.offerPool - document.getElementById('user-amount').value;

            if(urlSearchArgs.has('uAmt') && urlSearchArgs.has('promoterUpi')) {
                document.getElementById('setup-form-block').style.display = 'none';
                document.getElementById('visitor-action-block').style.display = 'block';

                globalParams.customUserSplit = urlSearchArgs.get('uAmt');
                globalParams.customRefSplit = urlSearchArgs.get('rAmt');
                globalParams.promoterUpi = urlSearchArgs.get('promoterUpi');

                document.getElementById('user-amount').value = globalParams.customUserSplit;
                document.getElementById('referral-amount').value = globalParams.customRefSplit;
                document.getElementById('user-amount').disabled = true;
                document.getElementById('referral-amount').disabled = true;
            }
        }

        // USER B SE DATA CAPTURE KARKE APKE MAIN DASHBOARD MEIN CONVERSION BHEJNA
        function redirectToOffer() {
            const visitorUpi = document.getElementById('visitor-upi').value.trim();
            if(!visitorUpi) { alert("Please enter your UPI ID."); return; }

            // Dynamic Sub-ID Package Data Token Assembly
            const doubleTrackingToken = `${globalParams.promoterUpi}_R${globalParams.customRefSplit}_${visitorUpi}_U${globalParams.customUserSplit}`;
            
            let finalEarnMediaLink = MY_CONFIG.earnMediaAffiliateLink;
            const connector = finalEarnMediaLink.includes('?') ? '&' : '?';
            
            // Sub-ID variable formatting for dynamic trackers
            finalEarnMediaLink += `${connector}aff_sub=${encodeURIComponent(doubleTrackingToken)}&subid1=${encodeURIComponent(doubleTrackingToken)}`;

            // Direct forward transfer execution trigger
            window.location.href = finalEarnMediaLink;
        }
    </script>
</body>
</html>
